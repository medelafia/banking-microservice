version: '3.7'

networks:
  microservice-net :
    driver: bridge
services:

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    ports:
      - "9100:9100"
  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./volumes/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:9.5.2
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./volumes/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      # ---- KRaft mode ----
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: EmptNWtoR4GGWx-BH6nGLQ

      # ---- Listeners ----
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ---- Single-node safe settings ----
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - ./kafka/data:/var/lib/kafka/data
    networks:
      - microservice-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - microservice-net
  user-service:
    build: user-service/.
    env_file:
      - ".env"
    networks:
      - microservice-net
    container_name: user-service-container
    ports:
      - "8083:8080"
  account-service:
    build: account-service/.
    env_file:
      - ".env"
    networks:
      - microservice-net
    container_name: account-service-container
    ports:
      - "8085:8080"
    depends_on:
      - user-service
      - transaction-service
      - kafka
  transaction-service:
    build: transaction-service/.
    env_file:
      - ".env"
    networks:
      - microservice-net
    container_name: transaction-service-container
    ports:
      - "8084:8080"
    depends_on:
      - kafka
      - account-service
  notification-service:
    build: notification-service/.
    env_file:
      - ".env"
    networks:
      - microservice-net
    container_name: notification-service-container
    ports:
      - "8082:8080"
    depends_on:
      - kafka

  mongo-service:
    image: mongo:latest
    networks:
      - microservice-net
    container_name: mongodb
    ports:
      - "27017:27017"

  mysql-db:
    image: mysql/mysql-server:8.0
    container_name: mysql-container
    env_file:
      - ".env"
    networks:
      - microservice-net
  
